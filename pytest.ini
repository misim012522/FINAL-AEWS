[pytest]
addopts = -p no:cacheprovider
testpaths =
    backend/tests
    .
norecursedirs =
    node_modules
    dist
    .git
    backend/scripts
    pytest-cache-files-3n3kre65
python_files = test_*.py
filterwarnings =
    ignore:'asyncio.iscoroutinefunction' is deprecated and slated for removal in Python 3.16; use inspect.iscoroutinefunction\(\) instead:DeprecationWarning:fastapi\.
    ignore:'asyncio.iscoroutinefunction' is deprecated and slated for removal in Python 3.16; use inspect.iscoroutinefunction\(\) instead:DeprecationWarning:starlette\.
